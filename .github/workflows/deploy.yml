name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # リポジトリ名 = Pages の base path
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_FIREBASE_API_KEY:          ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:      ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:       ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:   ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:           ${{ secrets.VITE_FIREBASE_APP_ID }}
          # Claude (Anthropic) API — AIアシスタント用
          # 【推奨】proxy モード: Cloudflare Worker が Firebase Auth 検証 + Anthropic 転送
          #         キーは Worker secret なのでクライアントに露出しない
          VITE_CLAUDE_PROXY_URL:          ${{ secrets.VITE_CLAUDE_PROXY_URL }}
          # 【非推奨】直接モード: proxy が無いときだけ使われる。キーがバンドルに含まれる
          VITE_ANTHROPIC_API_KEY:         ${{ secrets.VITE_ANTHROPIC_API_KEY }}
          VITE_ANTHROPIC_MODEL:           ${{ secrets.VITE_ANTHROPIC_MODEL }}
        run: npm run build

      - name: SPA fallback (404.html = index.html)
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
